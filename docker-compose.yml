version: '3.9'

services:
  postgres:
    image: postgres:16
    container_name: supplier_platform_db
    environment:
      POSTGRES_DB: supplier_platform
      POSTGRES_USER: supplier_admin
      POSTGRES_PASSWORD: supplier_pass
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d
      - ./database/migrations:/docker-entrypoint-initdb.d/migrations:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U supplier_admin -d supplier_platform"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: supplier_platform_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@supplier.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
